    <div class="py-10 px-8 text-center">
      <i class="ph ph-trash-simple efecto-icon-dialog"></i>
      <h2 mat-dialog-title class="!font-bold !text-xl items-center text-center flex gap-2">
        {{ data.title }}
      </h2>

      <mat-dialog-content class="!py-3">
        <p class="text-gray-500 text-sm leading-relaxed">
          {{ data.message }}
        </p>
        @if (data.itemName) {
          <div class="mt-3 bg-gray-50 italic text-gray-700 text-sm">
            "{{ data.itemName }}"
          </div>
        }
      </mat-dialog-content>

      <mat-dialog-actions align="center" class="!pb-0 !px-0 gap-2">
        <button mat-button (click)="onCancel()" cdkFocusInitial class="!text-gray-500 !px-6
                 focus:!ring-4 focus:!ring-gray-300 focus:!outline-none
                 transition-all">
          {{ data.cancelText || 'Cancelar' }}
        </button>
        <button mat-flat-button
                class="!bg-red-600 !text-white !px-6 hover:!bg-red-700
                 focus:!ring-4 focus:!ring-red-300 focus:!outline-none
                 transition-all"
                (click)="onConfirm()">
          {{ data.confirmText || 'Eliminar' }}
        </button>
      </mat-dialog-actions>
    </div>
