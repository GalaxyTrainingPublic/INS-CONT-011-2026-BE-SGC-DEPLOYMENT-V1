
<section class="bg-white rounded-xl shadow">
  <div class="relative overflow-hidden">
    <div class="flex flex-wrap py-6 items-center justify-between gap-y-4 px-4 form-style">
      <app-section-title title="Documentos Externos"/>
      <div class="w-full md:w-1/3">
        <div class="flex items-center">
          <mat-form-field class="w-full">
            <mat-label>Buscar nombre del documento...</mat-label>
            <input matInput (keyup)="applyFilter($event)" [(ngModel)]="searchQuery">
          </mat-form-field>
        </div>
      </div>
      <div class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3">
        <div class="flex items-center space-x-3 w-full md:w-auto">

          <mat-form-field>
            <mat-label>Versión</mat-label>
            <mat-select (selectionChange)="applySelectEstatus()" [(ngModel)]="selectedVersion">
              <mat-option value="all">Todas las versiones</mat-option>
              @for (version of versions; track version) {
                <mat-option [value]="version.value">{{version.viewValue}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
        <button matButton="filled" class="btn-docsys" (click)="createNewDocExternal()"><i class="ph ph-plus"></i> Nuevo</button>
        <button matButton="outlined" class="btn-docsys" (click)="resetFilters()"><i class="ph ph-broom"></i> Limpiar</button>
      </div>
    </div>
    <div class="overflow-x-auto table-container">
      <table mat-table [dataSource]="dataSource" class="w-full">

        <ng-container matColumnDef="documentTitle">
          <th mat-header-cell *matHeaderCellDef> Nombre </th>
          <td mat-cell *matCellDef="let element"> {{element.documentTitle}} </td>
        </ng-container>

        <ng-container matColumnDef="institutionalProcess">
          <th mat-header-cell *matHeaderCellDef> Fuente </th>
          <td mat-cell *matCellDef="let element"> {{element.institutionalProcess}} </td>
        </ng-container>

        <ng-container matColumnDef="editionVersion">
          <th mat-header-cell *matHeaderCellDef> Versión </th>
          <td mat-cell *matCellDef="let element"> {{element.editionVersion}} </td>
        </ng-container>

        <ng-container matColumnDef="approvalDate">
          <th mat-header-cell *matHeaderCellDef> Fecha </th>
          <td mat-cell *matCellDef="let element"> {{element.approvalDate}} </td>
        </ng-container>

        <ng-container matColumnDef="applicationScope">
          <th mat-header-cell *matHeaderCellDef> Enlace </th>
          <td mat-cell *matCellDef="let element">
            <a [href]="element.applicationScope" target="_blank" class="text-blue-600 hover:underline">
              Link
            </a>
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef width="100px"> Acciones </th>
          <td mat-cell *matCellDef="let el">
            <div class="flex justify-center">
              <button mat-icon-button matTooltip="Ver documento" color="accent" (click)="viewDocument(el)" class="btn-circle view-btn">
                <i class="ph ph-eye"></i>
              </button>
            </div>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

    </div>
    <nav class="flex flex-col py-6 paginator-container" aria-label="Table navigation">
      <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                    class="bg-white"
                    showFirstLastButtons
                    aria-label="Select page of periodic elements">
      </mat-paginator>
    </nav>
  </div>
</section>
