<div class="p-6 bg-white rounded-xl shadow-lg">

  <!-- HEADER + ACCIONES -->
  <div class="flex justify-between items-center mb-8">
    <h2 class="text-xl font-semibold">Flujo del Documento</h2>

    <div class="flex gap-2">
      <button class="bg-yellow-500 text-white px-4 py-2 rounded">
        Enviar a revisión
      </button>

      <button class="bg-purple-500 text-white px-4 py-2 rounded">
        Aprobar
      </button>

      <button class="bg-green-600 text-white px-4 py-2 rounded">
        Publicar
      </button>
    </div>
  </div>

  <!-- TIMELINE -->
  <div class="relative flex justify-between items-center mb-10">

    <!-- línea -->
    <div class="absolute top-5 left-0 w-full h-1 bg-gray-200"></div>

    <ng-container *ngFor="let step of steps">

      <div class="flex flex-col items-center relative z-10">

        <!-- nodo -->
        <div
          class="w-12 h-12 flex items-center justify-center rounded-full text-white font-bold transition-all duration-300"
          [ngClass]="{
            'bg-green-500': getState(step) === 'completed',
            'bg-blue-600 scale-125 shadow-lg': getState(step) === 'active',
            'bg-gray-300': getState(step) === 'pending'
          }">

          <ng-container *ngIf="getState(step) === 'completed'">✔</ng-container>
          <ng-container *ngIf="getState(step) === 'active'">●</ng-container>

        </div>

        <!-- label -->
        <span class="mt-2 text-sm" [ngClass]="{
            'text-green-600': getState(step) === 'completed',
            'text-blue-600 font-bold': getState(step) === 'active',
            'text-gray-400': getState(step) === 'pending'
          }">
          {{ step }}
        </span>

      </div>

    </ng-container>

  </div>

  <!-- ESTADO CENTRADO -->
  <div class="text-center mb-8">
    <span class="text-sm text-gray-500">Estado actual</span>
    <div class="text-xl font-bold text-blue-600">
      {{ currentStatus }}
    </div>
  </div>

  <!-- DRAG & DROP -->
  <div
    class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center cursor-pointer hover:border-blue-400 transition"
    (drop)="onFileDrop($event)" (dragover)="allowDrop($event)">

    <p class="text-gray-600 mb-2">
      Arrastra y suelta el documento aquí
    </p>

    <p class="text-sm text-gray-400 mb-4">
      o haz clic para seleccionar
    </p>

    <input type="file" class="hidden" #fileInput>

    <button class="bg-blue-600 text-white px-4 py-2 rounded" (click)="fileInput.click()">
      Seleccionar archivo
    </button>

  </div>

</div>
