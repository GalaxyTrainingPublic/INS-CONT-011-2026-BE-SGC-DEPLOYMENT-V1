<section class="bg-white rounded-xl shadow">
  <div class="relative overflow-hidden">
    <div class="flex flex-wrap py-6 items-center justify-between gap-y-4 px-4 form-style">
      <app-section-title title="Control de distribución de documentos" />
      <div class="w-full md:w-1/3">
        <div class="flex items-center">
          <mat-form-field class="w-full">
            <mat-label>Buscar código de documento...</mat-label>
            <input matInput (keyup)="applyFilter($event)" [(ngModel)]="searchQuery">
          </mat-form-field>
        </div>
      </div>
      <div
        class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3">
        <div class="flex items-center space-x-3 w-full md:w-auto">

          <mat-form-field>
            <mat-label>Área destino</mat-label>
            <mat-select (selectionChange)="applySelectAreas()" [(ngModel)]="selectedArea">
              <mat-option value="all">Todas las áreas</mat-option>
              @for (area of areas; track area) {
              <mat-option [value]="area.value">{{area.viewValue}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
        <button matButton="filled" class="btn-docsys" (click)="createNewDocExternal()"><i class="ph ph-plus"></i>
          Nuevo</button>
        <button matButton="outlined" class="btn-docsys" (click)="resetFilters()"><i class="ph ph-broom"></i>
          Limpiar</button>
      </div>
    </div>

    <div class="overflow-x-auto table-container">


      <table mat-table [dataSource]="dataSource" class="w-full">

        <ng-container matColumnDef="documentId">
          <th mat-header-cell *matHeaderCellDef>Código </th>
          <td mat-cell *matCellDef="let element"> {{element.documentId}} </td>
        </ng-container>


        <ng-container matColumnDef="targetArea">
          <th mat-header-cell *matHeaderCellDef>Area destino</th>
          <td mat-cell *matCellDef="let element"> {{element.targetArea}} </td>
        </ng-container>


        <ng-container matColumnDef="targetUser">
          <th mat-header-cell *matHeaderCellDef> Usuario destino </th>
          <td mat-cell *matCellDef="let element"> {{element.targetUser}} </td>
        </ng-container>


        <ng-container matColumnDef="sentDate">
          <th mat-header-cell *matHeaderCellDef>Fecha de envío </th>
          <td mat-cell *matCellDef="let element"> {{element.sentDate}} </td>
        </ng-container>

        <ng-container matColumnDef="type">
          <th mat-header-cell *matHeaderCellDef> Tipo </th>
          <td mat-cell *matCellDef="let element">{{element.type}}</td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef width="100px"> Acciones </th>
          <td mat-cell *matCellDef="let element" class="btn-table-container">

            <button mat-icon-button matTooltip="Ver documento" color="accent" class="btn-circle view-btn">
              <i class="ph ph-eye"></i>
            </button>
            <button matIconButton matTooltip="Editar documento" color="primary" class="btn-circle edit-btn">
              <i class="ph ph-pencil"></i>
            </button>
            <button matIconButton (click)="deleteDocument(element)" matTooltip="Eliminar documento" color="warn"
              class="btn-circle delet-btn">
              <i class="ph ph-trash"></i>
            </button>

          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>


    </div>


    <mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="Select page of periodic elements">
    </mat-paginator>


  </div>
  <!-- <div class="grid grid-cols-1 gap-4">
    <section class="flex justify-between items-center">
      <h2 class="text-lg font-semibold">Lista de Distribución</h2>
    </section>
  </div> -->


</section>
