<div class="w-full" style="width: 450px;">
  <div class="bg-white rounded-2xl shadow p-8 sm:p-10 border border-gray-100">

    <div class="flex justify-center mb-6">
      <div class="flex h-16 w-16 items-center justify-center rounded-2xl bg-[#324795] shadow-lg shadow-[#324795]/20">
        <img src="../../../../../assets/img/docmetrix_logo.png" class="p-2" alt="Logo">
      </div>
    </div>

    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Bienvenido</h1>
      <p class="text-gray-500 mt-2 text-sm">Ingresa tus credenciales para continuar</p>
    </div>

    <form class="space-y-5" (submit)="$event.preventDefault()">

      <!-- Usuario -->
      <div class="space-y-2">
        <label for="email" class="text-sm font-semibold text-gray-700 ml-1">Usuario</label>
        <div class="relative group">
          <i class="ph ph-user absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400 group-focus-within:text-[#324795] transition-colors"></i>
          <input
            id="email"
            name="email"
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            placeholder="nombre de usuario"
            class="w-full pl-11 pr-4 h-12 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#324795]/20 focus:border-[#324795] transition-all placeholder:text-gray-400 text-gray-600"
            required
          />
        </div>
      </div>

      <!-- Contraseña -->
      <div class="space-y-2">
        <label for="password" class="text-sm font-semibold text-gray-700 ml-1">Contraseña</label>
        <div class="relative group">
          <i class="ph ph-lock absolute left-3 top-1/2 -translate-y-1/2 text-xl text-gray-400 group-focus-within:text-[#324795] transition-colors"></i>
          <input
            id="password"
            name="password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            placeholder="••••••••"
            class="w-full pl-11 pr-12 h-12 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-[#324795]/20 focus:border-[#324795] transition-all placeholder:text-gray-400 text-gray-600"
            required
          />
          <button type="button" (click)="togglePassword()" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-[#324795] transition-colors">
            @if (showPassword()) {
              <i class="ph ph-eye-slash text-xl"></i>
            } @else {
              <i class="ph ph-eye text-xl"></i>
            }
          </button>
        </div>
      </div>

      <div class="flex items-center justify-between px-1">
        <label class="flex items-center gap-2 cursor-pointer group">
          <input
            type="checkbox"
            name="remember"
            [ngModel]="rememberMe()"
            (ngModelChange)="rememberMe.set($event)"
            class="w-4 h-4 rounded border-gray-300 text-[#324795] focus:ring-[#324795]">
          <span class="text-sm text-gray-500 group-hover:text-gray-700 transition-colors">Recordarme</span>
        </label>
        <a href="#" class="text-sm font-medium text-[#324795] hover:underline">¿Olvidaste tu contraseña?</a>
      </div>

      <button
        type="button"
        (click)="goSystem()"
        class="w-full cursor-pointer h-12 bg-[#324795] hover:bg-[#2a3b7d] text-white font-semibold rounded-xl shadow-lg shadow-[#324795]/20 transition-all duration-200 active:scale-[0.98] mt-2"
      >
        Iniciar Sesión
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-8"></p>
  </div>
</div>
