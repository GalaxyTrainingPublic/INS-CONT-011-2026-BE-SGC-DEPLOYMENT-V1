<section class="bg-white rounded-xl shadow">
  <div class="relative overflow-hidden">

    <div class="flex flex-wrap py-6 items-center justify-between gap-y-4 px-4 form-style">

      <div class="w-full flex border-b border-gray-100 pb-2 mb-4">
        <h2 class="font-semibold text-lg">Lista de personal</h2>
      </div>

      <div class="w-full md:w-1/3">
        <div class="flex items-center">
          <mat-form-field class="w-full">
            <mat-label>Buscar personal...</mat-label>
            <input matInput (keyup)="applyFilter($event)" [(ngModel)]="searchQuery">
          </mat-form-field>
        </div>
      </div>

      <!-- Filtros y Botones: Se alinean a la derecha en pantallas grandes -->
      <div class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3">
        <div class="flex items-center space-x-3 w-full md:w-auto">
          <mat-form-field>
            <mat-label>Cargo</mat-label>
            <mat-select [(ngModel)]="selectedCharge" (selectionChange)="syncFilters()">
              <mat-option value="all">Todos los cargos</mat-option>
              @for (charge of charges; track charge) {
                <mat-option [value]="charge.viewValue">{{charge.viewValue}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
          <mat-form-field>
            <mat-label>Área</mat-label>
            <mat-select (selectionChange)="applySelectFilter()" [(ngModel)]="selectedArea">
              <mat-option value="all">Todas las áreas</mat-option>
              @for (area of areas; track area) {
                <mat-option [value]="area.viewValue">{{area.viewValue}}</mat-option>
              }
            </mat-select>
          </mat-form-field>
        </div>
        <button matButton="filled" class="btn-docsys" (click)="createNew()"><span class="font-semibold me-1">+</span> Nuevo personal</button>
        <button matButton="outlined" class="btn-docsys" (click)="resetFilters()"><i class="ph ph-broom"></i> Limpiar</button>
      </div>
    </div>

    <div class="overflow-x-auto overflow-y-auto max-h-[26rem] table-container">

      <table mat-table [dataSource]="dataSource" class="min-w-full text-center">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Nombre </th>
          <td mat-cell *matCellDef="let el" class="text-center"> {{ el.name }} </td>
        </ng-container>

        <ng-container matColumnDef="position">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Cargo </th>
          <td mat-cell *matCellDef="let el" class="text-center"> {{ el.position }} </td>
        </ng-container>

        <ng-container matColumnDef="area">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Área </th>
          <td mat-cell *matCellDef="let el" class="text-center"> {{ el.area }} </td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef class="text-center"> Estado </th>
          <td mat-cell *matCellDef="let el" class="text-center">
            <span class="inline-block px-2 py-1 rounded text-sm font-medium whitespace-nowrap"
                  [ngClass]="{
                    'bg-[#dcfce7] text-[#15803d]': el.status === 'Activo',
                    'bg-[#fee2e2] text-[#b91c1c]': el.status === 'Inactivo'
                  }">
              {{ el.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef width="100px" class="text-center"> Acciones </th>
          <td mat-cell *matCellDef="let el" class="btn-table-container flex justify-center text-center">
            <button matIconButton matTooltip="Vista previa" color="accent" (click)="viewDetail(el)" class="btn-circle view-btn">
              <i class="ph ph-eye"></i>
            </button>
            <button matIconButton matTooltip="Editar" color="primary" (click)="editRow(el)" class="btn-circle edit-btn">
              <i class="ph ph-pencil-simple"></i>
            </button>
            <button matIconButton matTooltip="Eliminar" color="warn" (click)="deleteRow(el)" class="btn-circle delet-btn">
              <i class="ph ph-trash"></i>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      </table>

    </div>

    <nav class="flex flex-col py-6 paginator-container" aria-label="Navegación de tabla">
      <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                    class="bg-white"
                    showFirstLastButtons
                    aria-label="Seleccionar página de registros">
      </mat-paginator>
    </nav>
  </div>

  </section>
