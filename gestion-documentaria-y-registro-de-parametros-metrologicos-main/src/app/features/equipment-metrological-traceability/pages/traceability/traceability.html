
<section class="bg-white rounded-xl shadow">
  <div class="relative overflow-hidden">
      <div class="flex flex-col md:flex-row py-6 items-center justify-between space-y-3 md:space-y-0 md:space-x-4 px-4 form-style">
          <div class="w-full md:w-1/2">
              <form class="flex items-center">
                  <mat-form-field class="relative w-full">
                    <mat-label>Buscar ...</mat-label>
                    <input matInput placeholder="" >
                  </mat-form-field>
              </form>
          </div>
          <div class="w-full md:w-auto flex flex-col md:flex-row space-y-2 md:space-y-0 items-stretch md:items-center justify-end md:space-x-3 flex-shrink-0">
              <div class="flex items-center space-x-3 w-full md:w-auto">
                <mat-form-field>
                  <mat-label>Favorite food</mat-label>
                  <mat-select>
                    @for (food of foods; track food) {
                      <mat-option [value]="food.value">{{food.viewValue}}</mat-option>
                    }
                  </mat-select>
                </mat-form-field>
                <mat-form-field>
                  <mat-label>Favorite food</mat-label>
                  <mat-select>
                    @for (food of foods; track food) {
                      <mat-option [value]="food.value">{{food.viewValue}}</mat-option>
                    }
                  </mat-select>
                </mat-form-field>
              </div>
              <button matButton="filled" class="btn-docsys"><i class="ph ph-plus"></i>Nuevo</button>
              <button matButton="outlined" class="btn-docsys"><i class="ph ph-funnel"></i>Filtrar</button>
          </div>
      </div>
      <div class="overflow-x-auto table-container">
          <table mat-table [dataSource]="dataSource" class="w-full">
            <ng-container matColumnDef="position">
              <th mat-header-cell *matHeaderCellDef> No. </th>
              <td mat-cell *matCellDef="let element"> {{element.position}} </td>
            </ng-container>

            <ng-container matColumnDef="name">
              <th mat-header-cell *matHeaderCellDef> Name </th>
              <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="weight">
              <th mat-header-cell *matHeaderCellDef> Weight </th>
              <td mat-cell *matCellDef="let element"> {{element.weight}} </td>
            </ng-container>

            <ng-container matColumnDef="symbol">
              <th mat-header-cell *matHeaderCellDef> Symbol </th>
              <td mat-cell *matCellDef="let element"> {{element.symbol}} </td>
            </ng-container>

            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef width="130px"> Actions </th>
              <td mat-cell *matCellDef="let element" class="btn-table-container">
                <button matIconButton matTooltip="Edit" color="primary" class="btn-circle edit-btn">
                  <i class="ph ph-pencil-simple-line"></i>
                </button>
                <button matIconButton matTooltip="Delete" color="warn" class="btn-circle delet-btn">
                  <i class="ph ph-trash-simple"></i>
                </button>
                <button matIconButton matTooltip="View" color="accent" class="btn-circle view-btn">
                  <i class="ph ph-eye"></i>
                </button>
              </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
      </div>
      <nav class="flex flex-col py-6 paginator-container" aria-label="Table navigation">
        <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                      class="bg-white"
                      showFirstLastButtons
                      aria-label="Select page of periodic elements">
        </mat-paginator>
      </nav>
  </div>
</section>
